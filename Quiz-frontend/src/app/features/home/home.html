<div class="home-container">
  <div class="welcome-section">
    <h1 class="text-welcome">WELCOME TO</h1>
    <h2 class="text-brand">JUST4QUIZ</h2>
    <p class="sub-text">Enter your PIN to dive into the world of <br> intelligent trivia.</p>
  </div>

  <div class="pin-box-wrapper">
    <div class="pin-card">
      <span class="pin-badge">ENTER PIN</span>
      
      <div class="pin-input-group">
        <input type="text" [(ngModel)]="joinPin" maxlength="6" class="hidden-pin-input" (input)="onPinInput($event)">
        
        <div class="pin-field">{{ joinPin[0] || '' }}</div>
        <div class="pin-field">{{ joinPin[1] || '' }}</div>
        <div class="pin-field">{{ joinPin[2] || '' }}</div>
        <div class="pin-divider"></div>
        <div class="pin-field">{{ joinPin[3] || '' }}</div>
        <div class="pin-field">{{ joinPin[4] || '' }}</div>
        <div class="pin-field">{{ joinPin[5] || '' }}</div>
      </div>
      
      <button class="btn-join">
        JOIN GAME <i class="bolt-icon">⚡</i>
      </button>
    </div>
  </div>
</div>
