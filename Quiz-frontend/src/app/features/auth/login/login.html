<div class="login-card">
  <div class="login-left">
    <div class="overlay-content">
      <h1>Elevate your <br> Trivia Game</h1>
      <p>Join the most vibrant community of quiz enthusiasts...</p>
    </div>
  </div>

  <div class="login-right">
    <div class="form-container">
      <h2>Sign in</h2>
      <p class="subtitle">Welcome back! Please enter your details.</p>

      <button class="btn-google">
        <img src="assets/images/Google.png" alt="Google"> 
        Continue with Google
      </button>

      <div class="divider"><span>OR WITH EMAIL</span></div>

      <form>
        <div class="form-group">
          <label>EMAIL ADDRESS</label>
          <div class="input-wrapper">
            <i class="pi pi-envelope icon-left"></i>
            <input type="email" placeholder="hello@example.com">
          </div>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label>PASSWORD</label>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>
          <div class="input-wrapper">
            <i class="pi pi-lock icon-left"></i>
            
            <input [type]="passwordVisible ? 'text' : 'password'" placeholder="••••••••">
            
            <i class="pi eye-icon" 
              [ngClass]="passwordVisible ? 'pi-eye' : 'pi-eye-slash'" 
              (click)="togglePassword()"></i>
          </div>
        </div>

        <div class="options-row">
          <input type="checkbox" id="keep-signed">
          <label for="keep-signed"> Keep me signed in</label>
        </div>

        <button type="submit" class="btn-signin">Sign in</button>
      </form>

      <p class="footer-terms">
        By signing in, you agree to JUST4QUIZ's 
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </p>
    </div>
  </div>
</div>
